worker_processes 1;

events {
    worker_connections 1024;
}

# HTTP Server for HLS
http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 90;
        server_name localhost;

        location / {
            root   html;
            index  index.html index.htm;
        }

        # HLS streaming
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root html;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Quality-based recordings
        location /recordings {
            alias C:/nginx/html/recordings;
            add_header Access-Control-Allow-Origin *;
            add_header Content-Disposition "attachment";
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}

# RTMP Server Configuration
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            hls on;
            hls_path C:/nginx/html/hls/live;
            hls_fragment 4;
            hls_playlist_length 12;
            hls_nested off;
            hls_cleanup on;
            hls_sync 100ms;
            allow publish all;
            allow play all;
        }
    }
}
