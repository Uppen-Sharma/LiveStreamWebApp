# H2 Database Configuration (for development/testing)
server.port=8080
server.address=0.0.0.0

spring.application.name=livestream

# H2 Database settings
spring.datasource.url=jdbc:h2:mem:streamdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# WebSocket configuration
spring.websocket.enabled=true
spring.websocket.path=/ws
spring.websocket.allowed-origins=http://localhost:8080

# CORS configuration
spring.mvc.cors.allowed-origins=http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# Logging for debugging
logging.level.com.example.stream=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.messaging=DEBUG

# Initialize data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always 